<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alandeboer.computer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            user-select: none;
            font-family: 'Quicksand', sans-serif;
        }
        #site-name {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(80, 110, 220, 0.45);
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 7px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        #hint {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(80, 110, 220, 0.2);
            font-weight: 300;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        /* Cinematic vignette */
        #ui::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 45%, transparent 52%, rgba(0,0,0,0.42) 100%);
            pointer-events: none;
        }

        /* ── Controls panel ── */
        #controls {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 11px;
            pointer-events: all;
        }
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ctrl-row label {
            color: rgba(140, 170, 255, 0.75);
            font-family: 'Quicksand', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            width: 76px;
            text-align: left;
            flex-shrink: 0;
            cursor: default;
        }
        .ctrl-row input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 2px;
            border-radius: 1px;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        #brightness-slider {
            background: linear-gradient(to right, rgba(80,110,220,0.08), rgba(80,110,220,0.5));
        }
        #color-slider {
            background: linear-gradient(to right, #0e1e55, #1a3aaa, #aac0ff, #ee8833);
        }
        #lamp-slider {
            background: linear-gradient(to right, rgba(180,90,20,0.1), rgba(255,150,50,0.6));
        }
        #lamp-color-slider {
            background: linear-gradient(to right, #2a0e00, #cc5500, #ffeedd, #aabbff);
        }
        #time-slider {
            background: linear-gradient(to right, #0a1230, #28406e, #d08a4a, #aee0ff);
        }
        .ctrl-row.hidden { display: none; }
        #theme-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            pointer-events: all;
            background: rgba(20, 28, 60, 0.30);
            border: 1px solid rgba(110, 140, 240, 0.30);
            color: rgba(150, 175, 255, 0.85);
            font-family: 'Quicksand', sans-serif;
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 9px 16px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        #theme-btn:hover {
            background: rgba(45, 60, 115, 0.5);
            border-color: rgba(140, 170, 255, 0.55);
            color: rgba(205, 220, 255, 0.95);
        }
        .ctrl-sep {
            height: 1px;
            background: rgba(80, 110, 220, 0.1);
            margin: 1px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(130, 160, 255, 0.75);
            cursor: pointer;
            transition: background 0.15s;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            background: rgba(170, 195, 255, 0.95);
        }
        input[type="range"]::-moz-range-thumb {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(130, 160, 255, 0.75);
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="site-name">alandeboer.computer</div>
        <div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom</div>
        <div id="controls">
            <div class="ctrl-row">
                <label for="brightness-slider">brightness</label>
                <input type="range" id="brightness-slider" min="0.1" max="2.2" step="0.01" value="1.0">
            </div>
            <div class="ctrl-row" id="color-row">
                <label for="color-slider">color</label>
                <input type="range" id="color-slider" min="0" max="1" step="0.01" value="0.1">
            </div>
            <div class="ctrl-row hidden" id="time-row">
                <label for="time-slider">time</label>
                <input type="range" id="time-slider" min="0" max="1" step="0.01" value="1.0">
            </div>
            <div class="ctrl-sep"></div>
            <div class="ctrl-row" id="lamp-row">
                <label for="lamp-slider" id="lamp-label">lamp</label>
                <input type="range" id="lamp-slider" min="0" max="2.5" step="0.01" value="1.0">
            </div>
            <div class="ctrl-row" id="lamp-tint-row">
                <label for="lamp-color-slider">lamp tint</label>
                <input type="range" id="lamp-color-slider" min="0" max="1" step="0.01" value="0.0">
            </div>
        </div>
        <button id="theme-btn">enter the woods</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ── Renderer ──
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(0.5);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowMap;
        document.body.appendChild(renderer.domElement);

        // ── Scene ──
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030306);
        scene.fog = new THREE.FogExp2(0x030306, 0.07);

        // ── Theme groups: scenery is split so the button can swap worlds.
        //    Desk, person and dog live directly in the scene (shared).
        let theme = 'room';
        const roomGroup = new THREE.Group();
        const forestGroup = new THREE.Group();
        forestGroup.visible = false;
        scene.add(roomGroup);
        scene.add(forestGroup);
        let addTarget = scene; // construction target; switched per section below

        // ── Camera ──
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 30);
        camera.position.set(3.5, 2.6, 5.0);

        // ── Orbit controls ──
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.05, 0.2);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 0.4;
        controls.maxDistance = 9;
        controls.zoomSpeed = 3.0;
        controls.maxPolarAngle = Math.PI * 0.8;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.28;
        controls.update();

        let resumeTimer;
        controls.addEventListener('start', () => { controls.autoRotate = false; clearTimeout(resumeTimer); });
        controls.addEventListener('end',  () => { resumeTimer = setTimeout(() => (controls.autoRotate = true), 3500); });

        // ── Helpers ──
        const lm = (hex, emHex = 0, ei = 0) => {
            const m = new THREE.MeshLambertMaterial({ color: hex });
            if (emHex) { m.emissive.setHex(emHex); m.emissiveIntensity = ei; }
            return m;
        };
        const box = (w, h, d, mat, x, y, z, rx = 0, ry = 0, rz = 0) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            mesh.rotation.set(rx, ry, rz);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            addTarget.add(mesh);
            return mesh;
        };

        // ── Materials ──
        const M = {
            floor:     lm(0x141418),
            wall:      lm(0x111116),
            desk:      lm(0x221c0e),
            deskDark:  lm(0x16100a),
            metal:     lm(0x242424),
            frame:     lm(0x1c1c1c),
            fabric:    lm(0x1a1a30),
            skin:      lm(0xbd7a4a),
            hair:      lm(0x1a1206),
            shirt:     lm(0x1e3048),
            pants:     lm(0x161e28),
            macbook:   lm(0x2e2e2e),
            macScreen: lm(0x6688dd, 0x223388, 0.85),
            monFrame:  lm(0x181818),
            monScreen: lm(0x7799ff, 0x1a3399, 1.2),
        };

        // ═══════════════════════════════
        //  SCENE OBJECTS
        // ═══════════════════════════════

        addTarget = roomGroup; // ── room scenery from here ──

        const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), M.floor);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        addTarget.add(floorMesh);

        const grid = new THREE.GridHelper(14, 14, 0x0d0d14, 0x08080f);
        grid.position.y = 0.002;
        addTarget.add(grid);

        const wallMesh = new THREE.Mesh(new THREE.PlaneGeometry(10, 5.5), M.wall);
        wallMesh.position.set(0, 2.75, -2.8);
        wallMesh.receiveShadow = true;
        addTarget.add(wallMesh);

        // ── Left wall with window ──────────────────
        const SWX = -2.9;                 // side wall plane
        const WIN = { zc: -0.7, w: 1.5, y0: 1.0, y1: 2.6 };   // window opening
        const swSeg = (h, yc, zspan, zc) => {
            const m = box(0.06, h, zspan, M.wall, SWX, yc, zc);
            m.castShadow = false;
            return m;
        };
        swSeg(WIN.y0, WIN.y0/2, 6.0, 0.2);                              // below window
        swSeg(5.5 - WIN.y1, (5.5 + WIN.y1)/2, 6.0, 0.2);                // above window
        swSeg(WIN.y1 - WIN.y0, (WIN.y0+WIN.y1)/2, 1.35, -2.125);        // left of window
        swSeg(WIN.y1 - WIN.y0, (WIN.y0+WIN.y1)/2, 3.15, 1.625);         // right of window

        // Window frame + mullions
        const winFrameMat = lm(0x0c0c10);
        box(0.10, 0.06, WIN.w + 0.12, winFrameMat, SWX, WIN.y1 + 0.02, WIN.zc);  // header
        box(0.10, 0.06, WIN.w + 0.12, winFrameMat, SWX, WIN.y0 - 0.02, WIN.zc);  // footer
        box(0.10, WIN.y1 - WIN.y0 + 0.10, 0.06, winFrameMat, SWX, (WIN.y0+WIN.y1)/2, WIN.zc - WIN.w/2 - 0.02);
        box(0.10, WIN.y1 - WIN.y0 + 0.10, 0.06, winFrameMat, SWX, (WIN.y0+WIN.y1)/2, WIN.zc + WIN.w/2 + 0.02);
        box(0.07, 0.030, WIN.w, winFrameMat, SWX, (WIN.y0+WIN.y1)/2, WIN.zc);    // horizontal mullion
        box(0.07, WIN.y1 - WIN.y0, 0.030, winFrameMat, SWX, (WIN.y0+WIN.y1)/2, WIN.zc); // vertical mullion
        // Sill
        box(0.18, 0.035, WIN.w + 0.24, lm(0x16120c), SWX + 0.05, WIN.y0 - 0.055, WIN.zc);

        // ── Night city seen through the window ──
        const cityCanvas = document.createElement('canvas');
        cityCanvas.width = 512; cityCanvas.height = 440;
        const cc = cityCanvas.getContext('2d');
        // Night sky gradient
        const skyG = cc.createLinearGradient(0, 0, 0, 440);
        skyG.addColorStop(0, '#020310'); skyG.addColorStop(0.55, '#070b24'); skyG.addColorStop(1, '#101a38');
        cc.fillStyle = skyG; cc.fillRect(0, 0, 512, 440);
        // Stars
        for (let i = 0; i < 110; i++) {
            cc.fillStyle = `rgba(220,228,255,${0.25 + Math.random()*0.6})`;
            cc.fillRect(Math.random()*512, Math.random()*250, Math.random() < 0.12 ? 2 : 1, 1);
        }
        // Moon + halo
        const moonX = 392, moonY = 84;
        const halo = cc.createRadialGradient(moonX, moonY, 6, moonX, moonY, 70);
        halo.addColorStop(0, 'rgba(190,205,255,0.55)'); halo.addColorStop(1, 'rgba(190,205,255,0)');
        cc.fillStyle = halo; cc.fillRect(moonX-70, moonY-70, 140, 140);
        cc.fillStyle = '#dde4ff';
        cc.beginPath(); cc.arc(moonX, moonY, 22, 0, Math.PI*2); cc.fill();
        cc.fillStyle = 'rgba(160,170,210,0.5)';
        cc.beginPath(); cc.arc(moonX-7, moonY-4, 5, 0, Math.PI*2); cc.fill();
        cc.beginPath(); cc.arc(moonX+8, moonY+8, 3.4, 0, Math.PI*2); cc.fill();
        // Far skyline (dimmer)
        cc.fillStyle = '#0a0e22';
        let fx = 0;
        while (fx < 512) {
            const bw = 26 + Math.random()*48, bh = 90 + Math.random()*120;
            cc.fillRect(fx, 440 - bh - 60, bw, bh + 60);
            fx += bw + 3;
        }
        // Near skyline with lit windows
        fx = -10;
        while (fx < 512) {
            const bw = 40 + Math.random()*64, bh = 130 + Math.random()*170;
            const bx = fx, by = 440 - bh;
            cc.fillStyle = '#05060f';
            cc.fillRect(bx, by, bw, bh);
            // Rooftop detail
            if (Math.random() < 0.5) { cc.fillRect(bx + bw*0.3, by - 8, bw*0.2, 8); }
            if (Math.random() < 0.3) { cc.fillStyle = '#ff3344'; cc.fillRect(bx + bw*0.42, by - 12, 3, 4); cc.fillStyle = '#05060f'; }
            // Window grid — some lit
            for (let wy = by + 10; wy < 432; wy += 13) {
                for (let wx = bx + 6; wx < bx + bw - 8; wx += 11) {
                    if (Math.random() < 0.34) {
                        const warm = Math.random() < 0.7;
                        cc.fillStyle = warm
                            ? `rgba(255,${190+Math.random()*40|0},110,${0.5+Math.random()*0.5})`
                            : `rgba(150,200,255,${0.4+Math.random()*0.4})`;
                        cc.fillRect(wx, wy, 5, 7);
                    }
                }
            }
            fx += bw + 5 + Math.random()*14;
        }
        const cityTex = new THREE.CanvasTexture(cityCanvas);
        const cityMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(3.0, 2.5),
            new THREE.MeshBasicMaterial({ map: cityTex, fog: false })
        );
        cityMesh.position.set(SWX - 0.55, 1.85, WIN.zc);
        cityMesh.rotation.y = Math.PI / 2;
        addTarget.add(cityMesh);
        // Faint glass sheen
        const glassMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(WIN.w, WIN.y1 - WIN.y0),
            new THREE.MeshBasicMaterial({ color: 0x99bbff, transparent: true, opacity: 0.05, fog: false })
        );
        glassMesh.position.set(SWX + 0.02, (WIN.y0+WIN.y1)/2, WIN.zc);
        glassMesh.rotation.y = Math.PI / 2;
        addTarget.add(glassMesh);

        // Moonlight through the window — main shadow caster
        const moonLight = new THREE.DirectionalLight(0x8899cc, 2.2);
        moonLight.position.set(-6, 4.2, -0.7);
        moonLight.target.position.set(0.3, 0.6, 0.3);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.set(1024, 1024);
        moonLight.shadow.camera.left = -3.5; moonLight.shadow.camera.right = 3.5;
        moonLight.shadow.camera.top = 3.5;   moonLight.shadow.camera.bottom = -3.5;
        moonLight.shadow.camera.near = 1;    moonLight.shadow.camera.far = 14;
        moonLight.shadow.bias = -0.002;
        addTarget.add(moonLight);
        addTarget.add(moonLight.target);

        // ── Baseboards ──
        const bbMat = lm(0x1a1a20);
        box(9.96, 0.085, 0.025, bbMat, 0, 0.042, -2.785);          // back wall
        box(0.025, 0.085, 5.96, bbMat, SWX + 0.035, 0.042, 0.2);   // side wall

        // ── Wall outlet + power strip + cables ──
        box(0.07, 0.11, 0.018, lm(0x202026), 1.05, 0.22, -2.785);
        box(0.022, 0.022, 0.006, lm(0x0a0a0c), 1.05, 0.245, -2.772);
        box(0.022, 0.022, 0.006, lm(0x0a0a0c), 1.05, 0.205, -2.772);
        const stripBody = box(0.34, 0.045, 0.095, lm(0x18181e), 0.42, 0.025, -0.60);
        for (let i = 0; i < 4; i++) box(0.040, 0.012, 0.050, lm(0x060608), 0.30 + i*0.075, 0.050, -0.60);
        box(0.014, 0.010, 0.012, lm(0x100404, 0xff2222, 1.2), 0.56, 0.050, -0.575); // power LED
        const cableMat = lm(0x0a0a0c);
        const cable = (pts, r = 0.0075) => {
            const curve = new THREE.CatmullRomCurve3(pts.map(p => new THREE.Vector3(...p)));
            const m = new THREE.Mesh(new THREE.TubeGeometry(curve, 28, r, 5), cableMat);
            m.castShadow = true;
            addTarget.add(m);
            return m;
        };
        // Monitor power
        cable([[-0.15, 1.18, -0.34], [-0.10, 0.70, -0.50], [0.15, 0.12, -0.56], [0.34, 0.05, -0.60]]);
        // MacBook charger
        cable([[0.88, 0.79, 0.10], [0.95, 0.50, -0.18], [0.70, 0.08, -0.50], [0.50, 0.05, -0.59]], 0.006);
        // Strip → wall outlet
        cable([[0.58, 0.025, -0.62], [0.80, 0.012, -1.45], [1.00, 0.012, -2.40], [1.05, 0.16, -2.76]]);
        // Lamp cord
        cable([[-1.45, 0.03, 0.28], [-1.10, 0.012, -0.10], [0.10, 0.015, -0.55], [0.28, 0.04, -0.60]], 0.006);

        // ── Posters on the back wall ──
        const posterMesh = (canvas, w, h, x, y, rz = 0) => {
            const tex = new THREE.CanvasTexture(canvas);
            box(w + 0.05, h + 0.05, 0.018, lm(0x0e0e12), x, y, -2.776, 0, 0, rz);
            const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
                new THREE.MeshLambertMaterial({ map: tex, emissive: 0x202028, emissiveIntensity: 0.35 }));
            m.position.set(x, y, -2.764);
            m.rotation.z = rz;
            addTarget.add(m);
        };
        // Poster 1 — synthwave sunset
        const p1 = document.createElement('canvas'); p1.width = 256; p1.height = 340;
        const p1c = p1.getContext('2d');
        const p1g = p1c.createLinearGradient(0, 0, 0, 340);
        p1g.addColorStop(0, '#0d0221'); p1g.addColorStop(0.55, '#3a0b45'); p1g.addColorStop(1, '#0d0221');
        p1c.fillStyle = p1g; p1c.fillRect(0, 0, 256, 340);
        const sunG = p1c.createLinearGradient(0, 60, 0, 210);
        sunG.addColorStop(0, '#ffd23e'); sunG.addColorStop(1, '#ff2079');
        p1c.fillStyle = sunG;
        p1c.beginPath(); p1c.arc(128, 140, 70, 0, Math.PI*2); p1c.fill();
        p1c.fillStyle = '#0d0221';
        for (let i = 0; i < 6; i++) p1c.fillRect(58, 140 + i*12, 140, 4 + i);
        p1c.strokeStyle = '#ff2079'; p1c.lineWidth = 1.5;
        for (let i = 0; i < 7; i++) {
            p1c.beginPath(); p1c.moveTo(128, 215); p1c.lineTo(128 + (i-3)*85, 340); p1c.stroke();
        }
        for (let i = 0; i < 5; i++) {
            p1c.beginPath(); p1c.moveTo(0, 222 + i*i*7); p1c.lineTo(256, 222 + i*i*7); p1c.stroke();
        }
        p1c.fillStyle = '#20e0ff'; p1c.font = 'bold 22px monospace'; p1c.textAlign = 'center';
        p1c.fillText('N I G H T', 128, 42);
        posterMesh(p1, 0.62, 0.82, -3.55, 2.45, 0.015);
        // Poster 2 — terminal print
        const p2 = document.createElement('canvas'); p2.width = 256; p2.height = 300;
        const p2c = p2.getContext('2d');
        p2c.fillStyle = '#0a0e0a'; p2c.fillRect(0, 0, 256, 300);
        p2c.strokeStyle = '#1e3a1e'; p2c.lineWidth = 3; p2c.strokeRect(10, 10, 236, 280);
        p2c.fillStyle = '#46ff6e'; p2c.font = 'bold 26px monospace'; p2c.textAlign = 'left';
        ['EAT', 'SLEEP', 'CODE', 'REPEAT'].forEach((w, i) => p2c.fillText('> ' + w, 28, 78 + i*52));
        p2c.fillStyle = '#2a8f42'; p2c.font = '13px monospace';
        p2c.fillText('while(true){}', 28, 276);
        posterMesh(p2, 0.56, 0.66, 3.6, 2.55, -0.02);

        // ── Rug (large, under desk and chair) ──
        const rugCanvas = document.createElement('canvas');
        rugCanvas.width = 512; rugCanvas.height = 640;
        const rc = rugCanvas.getContext('2d');

        // Base near-black wine
        rc.fillStyle = '#100608';
        rc.fillRect(0, 0, 512, 640);
        // Outer field
        rc.fillStyle = '#1a0a08';
        rc.fillRect(28, 28, 456, 584);
        // Subdued gold border bands (frame)
        rc.fillStyle = '#3e2814';
        rc.fillRect(40, 40, 432, 8);
        rc.fillRect(40, 592, 432, 8);
        rc.fillRect(40, 40, 8, 560);
        rc.fillRect(464, 40, 8, 560);
        // Inner darker field (nearly black)
        rc.fillStyle = '#0a0306';
        rc.fillRect(60, 60, 392, 520);
        // Inner thin gold line
        rc.strokeStyle = '#2e1c0e';
        rc.lineWidth = 2;

        addTarget.add(lampLight);

        // Lamp spotlight — shadow-casting warm cone onto the floor
        const lampSpot = new THREE.SpotLight(0xff8833, 6.0, 5.0, Math.PI * 0.40, 0.55, 1.1);
        lampSpot.position.set(LX, 1.68, LZ);
        lampSpot.target.position.set(LX, 0, LZ);
        lampSpot.castShadow = true;
        lampSpot.shadow.mapSize.set(512, 512);
        lampSpot.shadow.bias = -0.003;
        addTarget.add(lampSpot);
        addTarget.add(lampSpot.target);

        addTarget = scene; // dust drifts in both worlds

        // ── Dust motes drifting through the air ──
        const DUST_N = 110;
        const dustPos = new Float32Array(DUST_N * 3);
        const dustBase = [], dustPhase = [];
        for (let i = 0; i < DUST_N; i++) {
            // Cluster a third of them near the lamp's warm cone
            const nearLamp = i % 3 === 0;
            const bx = nearLamp ? LX + (Math.random() - 0.5) * 0.7 : (Math.random() - 0.5) * 5.2;
            const bz = nearLamp ? LZ + (Math.random() - 0.5) * 0.7 : (Math.random() - 0.5) * 4.6;
            dustBase.push(bx, bz);
            dustPhase.push(Math.random());
            dustPos[i*3] = bx;
            dustPos[i*3+1] = 0.05 + Math.random() * 3.0;
            dustPos[i*3+2] = bz;
        }
        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({
            color: 0xaab2cc, size: 0.013, transparent: true, opacity: 0.20,
            sizeAttenuation: true,
        });
        const dustPoints = new THREE.Points(dustGeo, dustMat);
        addTarget.add(dustPoints);

        // ═══════════════════════════════
        //  UI CONTROLS
        // ═══════════════════════════════

        const params = { brightness: 1.0, color: 0.1, lampBrightness: 1.0, lampColor: 0.0, time: 1.0 };

        document.getElementById('time-slider').addEventListener('input', e => {
            params.time = parseFloat(e.target.value);
        });

        // ── Scenery toggle ──
        const themeBtn = document.getElementById('theme-btn');
        const setTheme = th => {
            theme = th;
            const forest = th === 'forest';
            roomGroup.visible = !forest;
            forestGroup.visible = forest;
            document.getElementById('time-row').classList.toggle('hidden', !forest);
            document.getElementById('color-row').classList.toggle('hidden', forest);
            document.getElementById('lamp-tint-row').classList.toggle('hidden', forest);
            document.getElementById('lamp-label').textContent = forest ? 'campfire' : 'lamp';
            themeBtn.textContent = forest ? 'back inside' : 'enter the woods';
        };
        themeBtn.addEventListener('click', () => setTheme(theme === 'room' ? 'forest' : 'room'));

        document.getElementById('brightness-slider').addEventListener('input', e => {
            params.brightness = parseFloat(e.target.value);
        });
        document.getElementById('color-slider').addEventListener('input', e => {
            params.color = parseFloat(e.target.value);
        });
        document.getElementById('lamp-slider').addEventListener('input', e => {
            params.lampBrightness = parseFloat(e.target.value);
        });
        document.getElementById('lamp-color-slider').addEventListener('input', e => {
            params.lampColor = parseFloat(e.target.value);
        });

        // Base intensities (before multipliers)
        const BASE = { hemi: 5.0, fill: 3.5, mon: 7.0, mb: 2.8, rim: 3.0, lamp: 4.0, lampSpot: 6.0, kb: 1.5, moon: 2.2 };

        // Scene color endpoints: cool blue → warm amber
        const coolSky    = new THREE.Color(0x2233aa);
        const warmSky    = new THREE.Color(0xaa6622);
        const coolGround = new THREE.Color(0x111122);
        const warmGround = new THREE.Color(0x221a0a);
        const coolFill   = new THREE.Color(0x3344bb);
        const warmFill   = new THREE.Color(0xbb8833);
        const coolMon    = new THREE.Color(0x1133cc);
        const warmMon    = new THREE.Color(0xdd7711);
        const tintColor  = new THREE.Color();

        // Lamp color endpoints: warm incandescent → cool daylight
        const lampWarm  = new THREE.Color(0xff8833);
        const lampCool  = new THREE.Color(0xbbccff);
        const lampTint  = new THREE.Color();

        // ═══════════════════════════════
        //  EVENTS & LOOP
        // ═══════════════════════════════

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        let _lastT = 0;
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const dt = Math.min(t - _lastT, 0.1);
            _lastT = t;
            const b = params.brightness;
            const c = params.color;

            // ── Dog AI/animation ──
            const ds = dogState;
            let moveTarget = null;
            const speed = 0.55;
            if (ds.mode === 'walking') {
                moveTarget = ds.waypoints[ds.wpIndex];
                if (t > ds.walkUntil) {
                    ds.mode = 'goingToBed';
                    ds.modeStart = t;
                }
            } else if (ds.mode === 'goingToBed') {
                moveTarget = [BEDX, BEDZ];
                const dx = moveTarget[0] - ds.pos[0], dz = moveTarget[1] - ds.pos[1];
                if (Math.hypot(dx, dz) < 0.04) {
                    ds.mode = 'inBed';
                    ds.modeStart = t;
                    ds.bedUntil = t + 28 + Math.random() * 18;
                    ds.pos[0] = BEDX; ds.pos[1] = BEDZ;
                    ds.facing = Math.PI * 0.6;
                    moveTarget = null;
                }
            } else if (ds.mode === 'inBed') {
                moveTarget = null;
                if (t > ds.bedUntil) {
                    ds.mode = 'walking';
                    ds.modeStart = t;
                    ds.wpIndex = 0;
                    ds.walkUntil = t + 25 + Math.random() * 20;
                }
            } else if (ds.mode === 'sniffing') {
                moveTarget = null;
                if (t > ds.sniffUntil) {
                    ds.mode = 'walking';
                    ds.modeStart = t;
                }
            }
            if (moveTarget) {
                const dx = moveTarget[0] - ds.pos[0], dz = moveTarget[1] - ds.pos[1];
                const dist = Math.hypot(dx, dz);
                if (dist < 0.08 && ds.mode === 'walking') {
                    ds.wpIndex = (ds.wpIndex + 1) % ds.waypoints.length;
                    // Something smells interesting here…
                    if (Math.random() < 0.45) {
                        ds.mode = 'sniffing';
                        ds.sniffUntil = t + 1.4 + Math.random() * 2.4;
                    }
                } else if (dist > 0.01) {
                    ds.pos[0] += (dx / dist) * speed * dt;
                    ds.pos[1] += (dz / dist) * speed * dt;
                    const targetFacing = Math.atan2(dx, dz);
                    let df = targetFacing - ds.facing;
                    while (df > Math.PI) df -= 2 * Math.PI;
                    while (df < -Math.PI) df += 2 * Math.PI;
                    ds.facing += df * Math.min(1, dt * 6);
                }
            }
            dogGroup.position.x = ds.pos[0];
            dogGroup.position.z = ds.pos[1];
            dogGroup.rotation.y = ds.facing;

            const isMoving = (ds.mode === 'walking' || ds.mode === 'goingToBed');
            const lerpK = Math.min(1, dt * 5);
            let headPitch = 0, headYaw = 0;
            if (isMoving) {
                const sw = Math.sin(t * 9) * 0.55;
                legFL.rotation.x = sw;
                legBR.rotation.x = sw;
                legFR.rotation.x = -sw;
                legBL.rotation.x = -sw;
                dogGroup.position.y = Math.abs(Math.sin(t * 9)) * 0.012;
                tail.rotation.y = Math.sin(t * 12) * 0.4;
                // Ears flop with the trot, slight head bob
                earL.rotation.x = Math.sin(t * 9) * 0.16;
                earR.rotation.x = Math.sin(t * 9 + 0.6) * 0.16;
                headPitch = Math.sin(t * 9 * 2) * 0.04;
            } else if (ds.mode === 'sniffing') {
                // Nose to the ground, sweeping side to side
                const tuckK = Math.min(1, dt * 4);
                [legFL, legFR, legBL, legBR].forEach(l => l.rotation.x += (0 - l.rotation.x) * tuckK);
                dogGroup.position.y += (0 - dogGroup.position.y) * lerpK;
                headPitch = 0.85 + Math.sin(t * 5.2) * 0.07;
                headYaw = Math.sin(t * 2.3) * 0.30;
                tail.rotation.y = Math.sin(t * 8) * 0.32;        // excited wag
                earL.rotation.x = Math.sin(t * 5.2) * 0.10;
                earR.rotation.x = Math.sin(t * 5.2 + 0.5) * 0.10;
            } else if (ds.mode === 'inBed') {
                // Curl up: legs tuck forward, body settles into the cushion
                const tuckK = Math.min(1, dt * 3);
                [legFL, legFR, legBL, legBR].forEach(l => l.rotation.x += (1.45 - l.rotation.x) * tuckK);
                dogGroup.position.y += (-0.040 - dogGroup.position.y) * tuckK;
                headPitch = 0.32 + Math.sin(t * 1.9) * 0.015;    // resting, gentle breathing
                tail.rotation.y = Math.sin(t * 1.5) * 0.15;
                earL.rotation.x += (0 - earL.rotation.x) * tuckK;
                earR.rotation.x += (0 - earR.rotation.x) * tuckK;
                dogBody.scale.y = 1 + Math.sin(t * 2.1) * 0.035;
            } else {
                [legFL, legFR, legBL, legBR].forEach(l => l.rotation.x += (0 - l.rotation.x) * lerpK);
                dogGroup.position.y += (0 - dogGroup.position.y) * lerpK;
                tail.rotation.y = 0;
            }
            if (ds.mode !== 'inBed') dogBody.scale.y += (1 - dogBody.scale.y) * lerpK;
            dogHeadGrp.rotation.x += (headPitch - dogHeadGrp.rotation.x) * lerpK;
            dogHeadGrp.rotation.y += (headYaw - dogHeadGrp.rotation.y) * lerpK;

            tintColor.copy(coolMon).lerp(warmMon, c);

            if (theme === 'room') {
                scene.background.setHex(0x030306);
                scene.fog.color.setHex(0x030306);
                scene.fog.density = 0.07;

                // Hemisphere — whole-scene ambient fill, color-shifted
                hemiLight.intensity = BASE.hemi * b;
                hemiLight.color.copy(coolSky).lerp(warmSky, c);
                hemiLight.groundColor.copy(coolGround).lerp(warmGround, c);

                // Directional fill — broad even illumination, color-shifted
                fillLight.intensity = BASE.fill * b;
                fillLight.color.copy(coolFill).lerp(warmFill, c);
            } else {
                // ── Forest day/night cycle (time slider: 0 night → 1 noon) ──
                const td = params.time;
                if (td < 0.5) skyCol.copy(skyNight).lerp(skyDusk, td * 2);
                else skyCol.copy(skyDusk).lerp(skyDay, (td - 0.5) * 2);
                scene.background.copy(skyCol);
                scene.fog.color.copy(skyCol).multiplyScalar(0.92);
                scene.fog.density = 0.028 + (1 - td) * 0.018;

                hemiLight.intensity = (0.9 + td * 5.5) * b;
                hemiLight.color.copy(skyCol);
                hemiLight.groundColor.copy(grNight).lerp(grDay, td);
                fillLight.intensity = 0.4 * b;
                fillLight.color.copy(skyCol);

                // Sun climbs from the horizon to overhead
                const el = -0.10 + td * 1.35;
                const sy = Math.sin(el), sc = Math.cos(el);
                forestSun.position.set(-sc * 9, sy * 10 + 0.3, -4.5);
                forestSun.intensity = Math.max(0, td - 0.07) * 7.5 * b;
                forestSun.color.copy(sunWarm).lerp(sunNoon, Math.min(1, td * 1.4));
                sunDisc.position.set(-sc * 10.5, sy * 11 + 0.3, -5.2);
                sunDisc.material.opacity = THREE.MathUtils.clamp((td - 0.08) * 4, 0, 1);
                sunDisc.lookAt(camera.position);

                // Moon + stars take over after dark
                moonDisc.material.opacity = THREE.MathUtils.clamp((0.5 - td) * 3.2, 0, 1);
                moonDisc.lookAt(camera.position);
                forestMoonLight.intensity = Math.max(0, 0.5 - td) * 3.6 * b;
                starMat.opacity = THREE.MathUtils.clamp((0.45 - td) * 2.6, 0, 1);

                // Fireflies wander once the light fades
                ffMat.opacity = THREE.MathUtils.clamp((0.4 - td) * 3, 0, 1) * (0.7 + Math.sin(t * 3.1) * 0.3);
                if (ffMat.opacity > 0.01) {
                    const fp = fireflies.geometry.attributes.position.array;
                    for (let i = 0; i < FF_N; i++) {
                        const s = ffSeed[i*4+3];
                        fp[i*3]   = ffSeed[i*4]   + Math.sin(t * 0.35 + s) * 0.5;
                        fp[i*3+1] = ffSeed[i*4+1] + Math.sin(t * 0.8 + s * 2) * 0.18;
                        fp[i*3+2] = ffSeed[i*4+2] + Math.cos(t * 0.3 + s) * 0.5;
                    }
                    fireflies.geometry.attributes.position.needsUpdate = true;
                }

                // Campfire — flicker scaled by the campfire slider
                const fb = params.lampBrightness;
                const fFlick = Math.sin(t * 11) * 0.18 + Math.sin(t * 23.7) * 0.12 + Math.sin(t * 5.3) * 0.10;
                fireLight.intensity = Math.max(0, (1.6 + fFlick) * fb * 2.2);
                for (let i = 0; i < flames.length; i++) {
                    const f = flames[i];
                    const sFl = fb < 0.05 ? 0.001 : 0.75 + Math.sin(t * 9 + i * 2.4) * 0.18 + fb * 0.25;
                    f.scale.set(sFl, sFl * (1 + Math.sin(t * 13 + i) * 0.12), sFl);
                    f.position.y = f.userData.baseY * f.scale.y;
                    f.rotation.y = t * (1.2 + i * 0.5);
                }
                ember.material.color.setHSL(0.03, 1.0, 0.10 + 0.14 * Math.min(fb, 1.5) + Math.sin(t * 7) * 0.03);
            }

            // Monitor flicker × brightness
            const flicker = Math.sin(t * 1.1) * 0.18 + Math.sin(t * 13.3) * 0.06;
            monLight.intensity = (BASE.mon + flicker) * b;
            monLight.color.copy(tintColor);

            mbLight.intensity = BASE.mb * b;
            mbLight.color.copy(tintColor).multiplyScalar(0.65);

            rimLight.intensity = BASE.rim * b;
            rimLight.color.copy(tintColor).multiplyScalar(0.4);

            // Screen emissive tracks tint
            M.monScreen.emissive.copy(tintColor).multiplyScalar(0.45);
            M.macScreen.emissive.copy(tintColor).multiplyScalar(0.3);

            // Floor lamp
            lampTint.copy(lampWarm).lerp(lampCool, params.lampColor);
            lampLight.intensity = BASE.lamp * params.lampBrightness;
            lampLight.color.copy(lampTint);
            lampSpot.intensity = BASE.lampSpot * params.lampBrightness;
            lampSpot.color.copy(lampTint);
            lampShadeMat.emissive.copy(lampTint).multiplyScalar(0.25 * params.lampBrightness);

            // Moonlight follows overall brightness
            moonLight.intensity = BASE.moon * Math.min(b, 1.4);

            // Steam animation — layer 1: tight rising wisps
            const mugTopY = mugBase + mugH;
            const sp = steamPoints.geometry.attributes.position.array;
            for (let i = 0; i < STEAM_N; i++) {
                const phase = (steamPhases[i] + t * 0.33) % 1;
                const spread = 0.008 + phase * 0.028;
                sp[i*3]   = CFX + steamXZ[i*2]   + Math.sin(t * 0.60 + i * 0.92) * spread;
                sp[i*3+1] = mugTopY + phase * 0.26;
                sp[i*3+2] = CFZ + steamXZ[i*2+1] + Math.cos(t * 0.50 + i * 1.15) * spread * 0.7;
            }
            steamPoints.geometry.attributes.position.needsUpdate = true;

            // Steam animation — layer 2: high diffuse fade
            const sp2 = steamPoints2.geometry.attributes.position.array;
            for (let i = 0; i < STEAM_N2; i++) {
                const phase = (steamPhases2[i] + t * 0.27) % 1;
                const spread = 0.020 + phase * 0.038;
                sp2[i*3]   = CFX + steamXZ2[i*2]   + Math.sin(t * 0.42 + i * 1.30) * spread;
                sp2[i*3+1] = mugTopY + 0.13 + phase * 0.22;
                sp2[i*3+2] = CFZ + steamXZ2[i*2+1] + Math.cos(t * 0.37 + i * 0.78) * spread * 0.8;
            }
            steamPoints2.geometry.attributes.position.needsUpdate = true;

            // Keyboard RGB — slow hue cycle
            const kbHue = (t * 0.04) % 1;
            kbKeyMat.emissive.setHSL(kbHue, 0.90, 0.32);
            kbLight.color.setHSL(kbHue, 0.90, 0.50);
            kbLight.intensity = BASE.kb * b;

            // ── Person idle animation ──
            const breath = (Math.sin(t * 1.25) + 1) * 0.5;
            torso.scale.y = 1 + 0.012 * breath;
            torso.scale.z = 1 + 0.035 * breath;
            // Glances between the monitor, the MacBook, and back
            headGroup.rotation.y = Math.sin(t * 0.16) * 0.20 + Math.sin(t * 0.047) * 0.11;
            headGroup.rotation.x = 0.16 + Math.sin(t * 0.30) * 0.018 + 0.010 * breath;
            // Fingers pecking at the keys
            for (let i = 0; i < fingerMeshes.length; i++) {
                const f = fingerMeshes[i];
                f.position.y = f.userData.baseY - Math.max(0, Math.sin(t * 12.5 + i * 1.93)) * 0.0075;
            }

            // ── Monitor screen: cursor blink + terminal output (2 fps redraw) ──
            if (t - monLastDraw > 0.5) {
                monLastDraw = t;
                drawMonitor(t);
                monTex.needsUpdate = true;
            }
            monScrMat.color.copy(scrCool).lerp(scrWarm, c);

            // ── Dust motes — slow rise with lateral drift ──
            const dp = dustPoints.geometry.attributes.position.array;
            for (let i = 0; i < DUST_N; i++) {
                const ph = (dustPhase[i] + t * 0.009) % 1;
                dp[i*3]   = dustBase[i*2]   + Math.sin(t * 0.10 + i * 1.37) * 0.09;
                dp[i*3+1] = 0.05 + ph * 3.0;
                dp[i*3+2] = dustBase[i*2+1] + Math.cos(t * 0.085 + i * 0.71) * 0.09;
            }
            dustPoints.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
